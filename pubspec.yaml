name: one_percent_better
description: "1% Better – Jeden Tag ein kleines bisschen besser werden."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Lokale Speicherung
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # Benachrichtigungen
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # In-App-Kauf (Google Play Billing)
  in_app_purchase: ^3.2.0
  in_app_purchase_android: ^0.3.6+2

  # Design
  google_fonts: ^6.2.1
  confetti: ^0.7.0

  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.4
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0

  # PDF-Export (Premium)
  pdf: ^3.11.0
  printing: ^5.13.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0A0A0A"
  image: "assets/icon/splash_logo.png"
  android_12:
    color: "#0A0A0A"
    image: "assets/icon/splash_logo.png"
